<body class="bg-surface text-on-surface min-h-screen pb-32">

</div>

<span class="text-primary font-label-bold text-label-bold uppercase tracking-wider">AI Analysis Complete</span>
</div>
<!-- Receipt Digitalization Container -->
<div class="grid lg:grid-cols-2 gap-8 items-start">
<!-- Original Image Reference (Left Column Desktop) -->

<div class="bg-surface-container-low rounded-xl overflow-hidden border border-outline-variant shadow-sm aspect-[3/4] relative">
<img class="w-full h-full object-cover opacity-80 mix-blend-multiply" data-alt="A high-resolution, sharp macro photograph of a restaurant receipt held against a clean, modern marble tabletop. The receipt shows detailed line items and clear black text. The lighting is bright and even, highlighting the paper's texture and the precise typography of the printed numbers. Professional financial aesthetics." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLxxMYyl7wK8mNIhowO1AzAcsmljTT2Td82IvK_n6tz0caZ7ZclPZVzxuqMkyCXAdC4NMfvw4Gk5mi8PrQ04RasNC_ufusyrD9FijJiGDmfLJFUPINo3EOTyp4rHNaN9RUOM0g8DYvKxVPNEC9RQBiHVlLeS8PkgREP_Sj7RWNppqCq1ASqKqio59-mtFm8T4WpSsC8tdgpJpQB3Yyxe_7RKlu2BfzcW3Iy5-N0IDbJuGu0RkWBpxgMZuRMIDH65ecXX50KRRfpMw"/>
<div class="absolute inset-0 border-2 border-primary/30 pointer-events-none rounded-xl"></div>
<div class="absolute top-4 right-4 bg-primary text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">Original Scan</div>
</div>
</div>
<!-- Extracted Data Review (Right Column Desktop / Main Mobile) -->
<div class="space-y-6">
<!-- Header Metadata Card -->
<div class="bg-surface-container-lowest p-6 rounded-xl border border-outline-variant receipt-card space-y-4">
<div class="space-y-1">
<label class="text-on-surface-variant font-label-bold text-label-bold uppercase">Merchant Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-primary px-0 py-2 font-headline-lg-mobile text-headline-lg-mobile text-primary focus:ring-0 focus:border-primary-container transition-colors" type="text" value="Blue Bottle Coffee"/>
<span class="absolute right-0 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant/50 text-sm">edit</span>
</div>
</div>
<div class="flex justify-between items-center pt-2">
<div class="space-y-1 flex-1">

<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">calendar_today</span>
<input class="bg-transparent border-0 p-0 text-on-surface font-body-md text-body-md focus:ring-0" type="date" value="2023-10-24"/>
</div>
</div>
<div class="space-y-1 flex-1 text-right">
<label class="text-on-surface-variant font-label-bold text-label-bold uppercase">Category</label>
<div class="flex items-center justify-end gap-2">

</div>
</div>
</div>
</div>

<button class="text-primary font-label-bold text-label-bold flex items-center gap-1 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-sm">add_circle</span> Add Item
                        </button>
</div>
<div class="divide-y divide-outline-variant">
<!-- Item Row 1 -->

</div>
<div class="flex items-center gap-3">
<div class="relative">

</div>
<button class="opacity-0 group-hover:opacity-100 transition-opacity text-error">
<span class="material-symbols-outlined text-sm">delete</span>
</button>
</div>
</div>
<!-- Item Row 2 -->
<div class="p-6 flex justify-between items-start group hover:bg-surface-container/30 transition-colors">

</div>
<div class="flex items-center gap-3">

<span class="absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md">$</span>
<input class="bg-transparent border-0 p-0 pl-4 w-16 text-right font-body-md text-body-md text-on-surface focus:ring-0" type="text" value="16.50"/>
</div>
<button class="opacity-0 group-hover:opacity-100 transition-opacity text-error">
<span class="material-symbols-outlined text-sm">delete</span>
</button>
</div>
</div>
<!-- Item Row 3 -->
<div class="p-6 flex justify-between items-start group hover:bg-surface-container/30 transition-colors">
<div class="space-y-1 flex-1">
<input class="bg-transparent border-0 p-0 w-full font-body-md text-body-md text-on-surface focus:ring-0" type="text" value="Oat Milk Latte"/>
<p class="text-on-surface-variant text-body-sm font-body-sm">Qty: 1</p>
</div>
<div class="flex items-center gap-3">
<div class="relative">

</div>

</div>

<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface font-bold">Total</span>

</div>
</div>
</div>
</div>

<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface/60 backdrop-blur-xl px-4 py-4 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-50">
<div class="max-w-container-max mx-auto grid grid-cols-2 gap-4">
<!-- Split Bill Button -->
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-xl py-3 hover:bg-secondary-container/80 transition-all active:scale-95" onclick="handleSplit()">
<div class="flex items-center gap-2 font-label-bold text-label-bold uppercase">
<span class="material-symbols-outlined text-sm">group</span>
                    Split this Bill
                </div>
<span class="text-[10px] opacity-70">Assign items to friends</span>
</button>
<!-- Confirm Button -->
<button class="flex flex-col items-center justify-center bg-primary text-white rounded-xl py-3 hover:bg-primary/90 transition-all active:scale-95 shadow-lg shadow-primary/20" onclick="handleConfirm()">
<div class="flex items-center gap-2 font-label-bold text-label-bold uppercase">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    Confirm Data
                </div>
<span class="text-[10px] opacity-70">Save to history</span>
</button>
</div>
</div>
<!-- Micro-interaction Scripts -->
<script>
        function handleConfirm() {
            const btn = event.currentTarget;
            btn.innerHTML = `
                <div class="flex items-center gap-2 font-label-bold text-label-bold uppercase">
                    <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Saving...
                </div>
            `;
            setTimeout(() => {
                alert("Receipt confirmed and saved successfully!");
                location.reload();
            }, 1200);
        }

        function handleSplit() {
            alert("Redirecting to itemized split view...");
        }

        // Simple feedback on input change
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('change', () => {
                input.parentElement.classList.add('animate-pulse');
                setTimeout(() => input.parentElement.classList.remove('animate-pulse'), 500);
            });
        });
    </script>
