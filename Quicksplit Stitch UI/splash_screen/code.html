<style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .gradient-bg {
            background: radial-gradient(circle at 50% 50%, #c7e7ff 0%, #f9f9fc 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center gradient-bg">
<!-- Subtle Atmospheric Background Detail -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary-container/20 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-secondary-container/30 blur-[120px]"></div>
</div>
<!-- Logo Section -->
<div class="relative z-10 flex flex-col items-center space-y-8 px-margin-mobile">
<!-- Animated Brand Icon Container -->
<div class="animate-float">
<div class="w-24 h-24 md:w-32 md:h-32 rounded-[32%] bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-2xl shadow-primary/20 ring-1 ring-white/20">
<span class="material-symbols-outlined text-on-primary text-[48px] md:text-[64px]" style="font-variation-settings: 'FILL' 1;">
                        payments
                    </span>
</div>
</div>
<!-- Brand Typography -->
<div class="text-center">
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tight md:text-[64px] md:leading-[1]">
                    QuickSplit
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-4 max-w-xs mx-auto opacity-80">
                    Effortless bill splitting powered by intelligent automation.
                </p>
</div>
</div>
<!-- Progress/Loading State -->
<div class="absolute bottom-24 flex flex-col items-center w-full max-w-xs px-margin-mobile">
<div class="w-full h-1 bg-surface-variant/30 rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full bg-primary rounded-full transition-all duration-[3000ms] ease-out w-0" id="loader"></div>
</div>
<span class="font-label-bold text-label-bold text-outline mt-4 uppercase tracking-widest">Initialising AI Core</span>
</div>
<!-- Footer / Legal Anchor -->
<div class="absolute bottom-8 text-center w-full px-margin-mobile">
<p class="font-label-bold text-label-bold text-on-surface-variant opacity-60">
                Securely managed by QuickSplit Financial Systems
            </p>
</div>
</main>
<!-- Interactive Layer / Micro-interaction JavaScript -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loader');
            
            // Start progress bar animation
            setTimeout(() => {
                loader.style.width = '100%';
            }, 100);

            // Subtle mouse move effect for background
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                const moveX = (x - 0.5) * 20;
                const moveY = (y - 0.5) * 20;
                
                document.querySelector('.gradient-bg').style.background = `radial-gradient(circle at ${50 + moveX}% ${50 + moveY}%, #c7e7ff 0%, #f9f9fc 100%)`;
            });
        });

        // Suppression of Shared Components as per "Destination Rule" & "Transactional/Task-Focused" rule
        // This is a Splash/Success screen, so TopAppBar and BottomNavBar are omitted.
    </script>
<!-- Visual Identity Check: 
         - Soft blue gradient background (radial-gradient with surface-container-low and primary-fixed)
         - Modern Minimalism (spacious layouts, focused typography)
         - Material Symbol Transcription (payments)
         - Tailwind Config Casing & Tokens applied
    -->
