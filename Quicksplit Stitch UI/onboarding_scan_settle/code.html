<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .scan-animation {
            animation: scanLine 3s ease-in-out infinite;
        }

        @keyframes scanLine {
            0%, 100% { top: 0%; opacity: 0; }
            50% { top: 100%; opacity: 1; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col overflow-x-hidden">

<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-12 pb-24 max-w-container-max mx-auto w-full relative">

<div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[442px] opacity-20 pointer-events-none">

<!-- Onboarding Visual Section -->
<div class="relative w-full aspect-[4/5] max-h-[450px] mb-12 flex items-center justify-center fade-in-up" style="animation-delay: 0.1s;">

<div class="flex justify-between items-center mb-6">

<!-- Scanning Line Effect -->

<!-- Detected Regions Overlay -->
<div class="absolute top-1/4 left-4 right-4 h-8 border border-primary/50 bg-primary/10 rounded-sm"></div>
<div class="absolute top-[45%] left-4 right-4 h-8 border border-primary/50 bg-primary/10 rounded-sm"></div>
</div>
<!-- Bottom Notification/Feedback -->
<div class="mt-4 p-3 bg-secondary-container rounded-xl flex items-center gap-3">

<div class="flex-grow">

</div>
</div>

<!-- Interactive Elements Script -->
<script>
        // Subtle parallax or interaction if needed
        document.addEventListener('mousemove', (e) => {
            const amount = 10;
            const x = (window.innerWidth / 2 - e.pageX) / amount;
            const y = (window.innerHeight / 2 - e.pageY) / amount;
            
            const floatingElements = document.querySelectorAll('.glass-card');
            floatingElements.forEach((el, index) => {
                const factor = (index + 1) * 0.5;
                el.style.transform = `translate(${x * factor}px, ${y * factor}px) ${index === 1 ? 'rotate(-5deg)' : ''}`;
            });
        });
    </script>
