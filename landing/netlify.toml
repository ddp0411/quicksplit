# Netlify config for the QuickSplit landing page (static, no build step).
# Deploy with the publish directory set to this `landing/` folder.

[build]
  publish = "."
  command = ""

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/support"
  to = "/support.html"
  status = 200
